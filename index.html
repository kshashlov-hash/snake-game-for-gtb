<!DOCTYPE html>
<html>
<head>
    <title>Snake Pro TMA</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #1a1a1a; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }
        .score { font-size: 24px; margin-bottom: 10px; font-weight: bold; color: #4CAF50; }
        canvas { border: 2px solid #333; background: #000; border-radius: 8px; }
        .controls { 
            margin-top: 20px; 
            display: grid; 
            grid-template-areas: ". up ." "left down right"; 
            gap: 10px; 
        }
        .btn { 
            width: 65px; 
            height: 65px; 
            background: #333; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-size: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .btn:active { background: #4CAF50; transform: scale(0.95); }
        .up { grid-area: up; }
        .left { grid-area: left; }
        .down { grid-area: down; }
        .right { grid-area: right; }
    </style>
</head>
<body>
    <div class="score">Score: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <button class="btn up" onclick="changeDir('up')">▲</button>
        <button class="btn left" onclick="changeDir('left')">◀</button>
        <button class="btn down" onclick="changeDir('down')">▼</button>
        <button class="btn right" onclick="changeDir('right')">▶</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем Telegram, что приложение готово
        tg.expand();
        if (tg.headerColor) tg.setHeaderColor('#1a1a1a');

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const gridSize = 20;
        let count = 0;
        let score = 0;

        function resizeCanvas() {
            const availableWidth = window.innerWidth - 30;
            const availableHeight = window.innerHeight - 280; 
            canvas.width = Math.floor(availableWidth / gridSize) * gridSize;
            canvas.height = Math.floor(availableHeight / gridSize) * gridSize;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let snake = { x: gridSize*2, y: gridSize*2, dx: gridSize, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: gridSize*5, y: gridSize*5 };

        function placeApple() {
            apple.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            apple.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }
        placeApple();

        function changeDir(dir) {
            if (dir === 'left' && snake.dx === 0) { snake.dx = -gridSize; snake.dy = 0; }
            else if (dir === 'up' && snake.dy === 0) { snake.dy = -gridSize; snake.dx = 0; }
            else if (dir === 'right' && snake.dx === 0) { snake.dx = gridSize; snake.dy = 0; }
            else if (dir === 'down' && snake.dy === 0) { snake.dy = gridSize; snake.dx = 0; }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function resetGame() {
            snake.x = gridSize*2; snake.y = gridSize*2; 
            snake.cells = []; snake.maxCells = 4;
            snake.dx = gridSize; snake.dy = 0;
            score = 0; scoreElement.innerText = score;
        }

        // Настройка главной кнопки Telegram
        tg.MainButton.setParams({
            text: "ЗАВЕРШИТЬ И СОХРАНИТЬ",
            color: "#4CAF50", // Сделаем её зеленой под цвет змейки
            text_color: "#ffffff",
            is_active: true,
            is_visible: true
        });

        // Отдельно вызываем показ, на всякий случай
        tg.MainButton.show();

        tg.MainButton.onClick(() => {
            if (score > 0) {
                tg.sendData(score.toString());
            } else {
                tg.close();
            }
        });

        function loop() {
            requestAnimationFrame(loop);
            
            // СКОРОСТЬ: Чем выше число, тем медленнее (10 - хороший баланс)
            if (++count < 10) return;  
            
            count = 0;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            snake.x += snake.dx;
            snake.y += snake.dy;

            if (snake.x < 0) snake.x = canvas.width - gridSize;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - gridSize;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            // Рисуем яблоко
            ctx.fillStyle = '#ff4d4d';
            ctx.fillRect(apple.x, apple.y, gridSize-1, gridSize-1);

            // Рисуем змейку
            ctx.fillStyle = '#4CAF50';
            snake.cells.forEach(function(cell, index) {
                ctx.fillRect(cell.x, cell.y, gridSize-1, gridSize-1);
                
                // Змейка съела яблоко
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score++;
                    scoreElement.innerText = score;
                    placeApple();
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }

                // Проверка столкновения с собой
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        if (score > 0) {
                            tg.sendData(score.toString());
                        }
                        resetGame();
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    }
                }
            });
        }

        // Запуск игрового цикла
        requestAnimationFrame(loop);
    </script>
</body>
</html>
