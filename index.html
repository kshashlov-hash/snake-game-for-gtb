<!DOCTYPE html>
<html>
<head>
    <title>Snake Pro TMA</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #1a1a1a; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; color: white; font-family: sans-serif; overflow: hidden; 
            touch-action: none; 
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            width: 90%; margin-bottom: 15px; 
            /* Важно: разрешаем события мыши здесь */
            pointer-events: auto; 
        }
        .score { font-size: 22px; font-weight: bold; color: #4CAF50; }
        .exit-btn {
            padding: 10px 20px; background: #ff4d4d; color: white;
            border: none; border-radius: 10px; font-weight: bold;
            /* Увеличим зону нажатия */
            min-width: 100px;
            touch-action: manipulation;
        }
        canvas { border: 2px solid #333; background: #000; border-radius: 8px; }
        .controls { margin-top: 15px; display: grid; grid-template-areas: ". up ." "left down right"; gap: 10px; }
        .btn { 
            width: 65px; height: 65px; background: #333; border: none; border-radius: 12px; 
            color: white; font-size: 24px; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .btn:active { background: #4CAF50; }
        .up { grid-area: up; } .left { grid-area: left; } .down { grid-area: down; } .right { grid-area: right; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="score">Score: <span id="scoreVal">0</span></div>
        <button class="exit-btn" id="saveBtn">ЗАВЕРШИТЬ</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <button class="btn up" onclick="changeDir('up')">▲</button>
        <button class="btn left" onclick="changeDir('left')">◀</button>
        <button class="btn down" onclick="changeDir('down')">▼</button>
        <button class="btn right" onclick="changeDir('right')">▶</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const saveBtn = document.getElementById("saveBtn");
        
        const gridSize = 20;
        let count = 0;
        let score = 0;
        let snake = { x: 160, y: 160, dx: gridSize, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 320, y: 320 };

        function resizeCanvas() {
            const availableWidth = window.innerWidth - 30;
            const availableHeight = window.innerHeight - 300; 
            canvas.width = Math.floor(availableWidth / gridSize) * gridSize;
            canvas.height = Math.floor(availableHeight / gridSize) * gridSize;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function placeApple() {
            apple.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            apple.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function changeDir(dir) {
            if (dir === 'left' && snake.dx === 0) { snake.dx = -gridSize; snake.dy = 0; }
            else if (dir === 'up' && snake.dy === 0) { snake.dy = -gridSize; snake.dx = 0; }
            else if (dir === 'right' && snake.dx === 0) { snake.dx = gridSize; snake.dy = 0; }
            else if (dir === 'down' && snake.dy === 0) { snake.dy = gridSize; snake.dx = 0; }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // Функция завершения с принудительным закрытием
        function finishGame() {
    const scoreStr = String(score || 0).trim();
    
    // 1. Проверяем, где открыта игра (unsafe.chat_type)
    // 'sender' - личка, 'group'/'supergroup' - чаты
    const chatType = tg.initDataUnsafe.chat_type;

    if (score > 0) {
        // Если мы в ЛИЧКЕ (sender) - используем sendData
        if (chatType === 'sender') {
            try {
                tg.sendData(scoreStr);
                setTimeout(() => { tg.close(); }, 100);
            } catch (err) {
                // Фоллбэк на случай непредвиденной ошибки
                alert("Результат: " + scoreStr);
                tg.close();
            }
        } 
        // Если мы в ГРУППЕ или КАНАЛЕ
        else {
            alert("Игра окончена! Твой счёт: " + scoreStr + "\n\nЧтобы сохранить результат в таблицу лидеров, играй в личке бота.");
            tg.close();
        }
    } else {
        // Если 0 очков, просто закрываем
        tg.close();
    }
}

        // Обработка кнопки
        saveBtn.onclick = finishGame;
        saveBtn.ontouchstart = (e) => {
            e.preventDefault();
            finishGame();
        };

        function loop() {
            requestAnimationFrame(loop);
            if (++count < 10) return;
            count = 0;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            snake.x += snake.dx;
            snake.y += snake.dy;

            // Сквозной проход через стены
            if (snake.x < 0) snake.x = canvas.width - gridSize;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - gridSize;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            // Рисуем яблоко
            ctx.fillStyle = '#ff4d4d';
            ctx.fillRect(apple.x, apple.y, gridSize-1, gridSize-1);

            // Рисуем змейку
            ctx.fillStyle = '#4CAF50';
            snake.cells.forEach(function(cell, index) {
                ctx.fillRect(cell.x, cell.y, gridSize-1, gridSize-1);
                
                // Проверка на яблоко
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score++;
                    scoreElement.innerText = score;
                    placeApple();
                }

                // Проверка столкновения с собой (начиная со второго сегмента)
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        // Вибрация при проигрыше
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                        finishGame();
                    }
                }
            });
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
