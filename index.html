<!DOCTYPE html>
<html>
<head>
    <title>Snake Pro TMA</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            background: #1a1a1a; margin: 0; padding: 0;
            display: flex; flex-direction: column; 
            height: 100vh; color: white; font-family: sans-serif; 
            overflow: hidden; touch-action: none;
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; height: 50px; 
            padding: 0 15px; background: #222; 
            pointer-events: auto; flex-shrink: 0;
        }
        .score { font-size: 20px; font-weight: bold; color: #4CAF50; }
        .exit-btn {
            padding: 6px 15px; background: #ff4d4d; color: white;
            border: none; border-radius: 6px; font-weight: bold;
            min-width: 80px; font-size: 14px;
            touch-action: manipulation;
        }

        #game-wrapper {
            flex: 1; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; padding: 10px; 
        }

        canvas { 
            border: 2px solid #333; background: #000; border-radius: 4px;
        }

        .controls { 
            height: 160px; 
            width: 100%; display: grid; grid-template-areas: ". up ." "left down right"; gap: 8px;
            padding: 10px 20px; flex-shrink: 0; background: #1a1a1a;
        }
        .btn { 
            width: 100%; height: 60px; 
            background: #333; border: none; border-radius: 10px; 
            color: white; font-size: 20px; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #4CAF50; }
        .up { grid-area: up; } .left { grid-area: left; } .down { grid-area: down; } .right { grid-area: right; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="score">Score: <span id="scoreVal">0</span></div>
        <button class="exit-btn" id="saveBtn">ЗАВЕРШИТЬ</button>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn up" onclick="changeDir('up')">▲</button>
        <button class="btn left" onclick="changeDir('left')">◀</button>
        <button class="btn down" onclick="changeDir('down')">▼</button>
        <button class="btn right" onclick="changeDir('right')">▶</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const saveBtn = document.getElementById("saveBtn");
        const wrapper = document.getElementById("game-wrapper");
        
        const gridSize = 20;
        let count = 0;
        let score = 0;
        let snake = { x: 160, y: 160, dx: gridSize, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 320, y: 320 };

        function resizeCanvas() {
            const availableWidth = wrapper.clientWidth - 20;
            const availableHeight = wrapper.clientHeight - 20;

            const newWidth = Math.floor(availableWidth / gridSize) * gridSize;
            const newHeight = Math.floor(availableHeight / gridSize) * gridSize;

            if (canvas.width === newWidth && canvas.height === newHeight) return;

            canvas.width = newWidth;
            canvas.height = newHeight;

            // Сброс позиции при ресайзе
            snake.cells = []; 
            snake.maxCells = 4;
            snake.x = Math.floor((canvas.width / 2) / gridSize) * gridSize;
            snake.y = Math.floor((canvas.height / 2) / gridSize) * gridSize;
            placeApple(); 
        }

        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function placeApple() {
            apple.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            apple.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function changeDir(dir) {
            if (dir === 'left' && snake.dx === 0) { snake.dx = -gridSize; snake.dy = 0; }
            else if (dir === 'up' && snake.dy === 0) { snake.dy = -gridSize; snake.dx = 0; }
            else if (dir === 'right' && snake.dx === 0) { snake.dx = gridSize; snake.dy = 0; }
            else if (dir === 'down' && snake.dy === 0) { snake.dy = gridSize; snake.dx = 0; }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function finishGame() {
            const scoreStr = String(score || "0").trim();
            if (score > 0) {
                try {
                    tg.sendData(scoreStr);
                    setTimeout(() => { tg.close(); }, 150);
                } catch (err) {
                    alert("Игра окончена! Твой счёт: " + scoreStr + "\n(В группах счёт не сохраняется)");
                    tg.close();
                }
            } else {
                tg.close();
            }
        }

        saveBtn.onclick = finishGame;
        saveBtn.ontouchstart = (e) => {
            e.preventDefault();
            finishGame();
        };

        function loop() {
            requestAnimationFrame(loop);
            if (++count < 10) return;
            count = 0;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            snake.x += snake.dx;
            snake.y += snake.dy;

            if (snake.x < 0) snake.x = canvas.width - gridSize;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - gridSize;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            ctx.fillStyle = '#ff4d4d';
            ctx.fillRect(apple.x, apple.y, gridSize-1, gridSize-1);

            ctx.fillStyle = '#4CAF50';
            snake.cells.forEach(function(cell, index) {
                ctx.fillRect(cell.x, cell.y, gridSize-1, gridSize-1);
                
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score++;
                    scoreElement.innerText = score;
                    placeApple();
                }

                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                        finishGame();
                    }
                }
            });
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
