<!DOCTYPE html>
<html>
<head>
    <title>Snake Pro TMA</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #1a1a1a; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }
        .score { font-size: 24px; margin-bottom: 10px; font-weight: bold; color: #4CAF50; }
        canvas { border: 2px solid #333; background: #000; border-radius: 8px; }
        .controls { 
            margin-top: 15px; 
            display: grid; 
            grid-template-areas: ". up ." "left down right"; 
            gap: 8px; 
        }
        .btn { 
            width: 60px; 
            height: 60px; 
            background: #333; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-size: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .btn:active { background: #4CAF50; transform: scale(0.95); }
        
        /* Стиль для новой кнопки выхода */
        .exit-btn {
            margin-top: 15px;
            padding: 12px 24px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .exit-btn:active { background: #cc0000; transform: scale(0.98); }

        .up { grid-area: up; }
        .left { grid-area: left; }
        .down { grid-area: down; }
        .right { grid-area: right; }
    </style>
</head>
<body>
    <div class="score">Score: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <button class="btn up" onclick="changeDir('up')">▲</button>
        <button class="btn left" onclick="changeDir('left')">◀</button>
        <button class="btn down" onclick="changeDir('down')">▼</button>
        <button class="btn right" onclick="changeDir('right')">▶</button>
    </div>

    <button class="exit-btn" onclick="finishGame()">Завершить игру</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const gridSize = 20;
        let count = 0;
        let score = 0;

        function resizeCanvas() {
            const availableWidth = window.innerWidth - 30;
            const availableHeight = window.innerHeight - 320; 
            canvas.width = Math.floor(availableWidth / gridSize) * gridSize;
            canvas.height = Math.floor(availableHeight / gridSize) * gridSize;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let snake = { x: gridSize*2, y: gridSize*2, dx: gridSize, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: gridSize*5, y: gridSize*5 };

        function placeApple() {
            apple.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            apple.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }
        placeApple();

        function changeDir(dir) {
            if (dir === 'left' && snake.dx === 0) { snake.dx = -gridSize; snake.dy = 0; }
            else if (dir === 'up' && snake.dy === 0) { snake.dy = -gridSize; snake.dx = 0; }
            else if (dir === 'right' && snake.dx === 0) { snake.dx = gridSize; snake.dy = 0; }
            else if (dir === 'down' && snake.dy === 0) { snake.dy = gridSize; snake.dx = 0; }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // Глобальная функция выхода
        function finishGame() {
            if (score > 0) {
                tg.sendData(score.toString());
            } else {
                tg.close();
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            if (++count < 10) return;  
            count = 0;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            snake.x += snake.dx;
            snake.y += snake.dy;

            if (snake.x < 0) snake.x = canvas.width - gridSize;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - gridSize;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            ctx.fillStyle = '#ff4d4d';
            ctx.fillRect(apple.x, apple.y, gridSize-1, gridSize-1);

            ctx.fillStyle = '#4CAF50';
            snake.cells.forEach(function(cell, index) {
                ctx.fillRect(cell.x, cell.y, gridSize-1, gridSize-1);
                
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score++;
                    scoreElement.innerText = score;
                    placeApple();
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }

                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        finishGame(); // При столкновении отправляем счет
                    }
                }
            });
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
