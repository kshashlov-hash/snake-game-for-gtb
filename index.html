<!DOCTYPE html>
<html>
<head>
    <title>Snake for Telegram</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 2px solid #333; background: #000; touch-action: none; }
        .score { position: absolute; top: 20px; font-size: 20px; }
    </style>
</head>
<body>
    <div class="score">Счет: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на все окно

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        const gridSize = 20;
        let count = 0;
        let score = 0;
        
        // Подгоняем размер под экран
        canvas.width = Math.floor((window.innerWidth - 40) / gridSize) * gridSize;
        canvas.height = Math.floor((window.innerHeight - 100) / gridSize) * gridSize;

        let snake = { x: 160, y: 160, dx: gridSize, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 320, y: 320 };

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function loop() {
            requestAnimationFrame(loop);
            if (++count < 6) return; // Скорость игры
            count = 0;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            snake.x += snake.dx;
            snake.y += snake.dy;

            // Стены (проход сквозь них)
            if (snake.x < 0) snake.x = canvas.width - gridSize;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - gridSize;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            // Рисуем яблоко
            ctx.fillStyle = '#ff4d4d';
            ctx.fillRect(apple.x, apple.y, gridSize-1, gridSize-1);

            // Рисуем змейку
            ctx.fillStyle = '#4CAF50';
            snake.cells.forEach(function(cell, index) {
                ctx.fillRect(cell.x, cell.y, gridSize-1, gridSize-1);
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score++;
                    scoreElement.innerText = score;
                    apple.x = getRandomInt(0, canvas.width / gridSize) * gridSize;
                    apple.y = getRandomInt(0, canvas.height / gridSize) * gridSize;
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                }
                // Проверка столкновения с собой
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        snake.x = 160; snake.y = 160; snake.cells = [];
                        snake.maxCells = 4; snake.dx = gridSize; snake.dy = 0;
                        score = 0; scoreElement.innerText = score;
                    }
                }
            });
        }

        // Управление свайпами
        let touchStartX = 0; let touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        document.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - touchStartX;
            let dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && snake.dx === 0) { snake.dx = gridSize; snake.dy = 0; }
                else if (dx < 0 && snake.dx === 0) { snake.dx = -gridSize; snake.dy = 0; }
            } else {
                if (dy > 0 && snake.dy === 0) { snake.dy = gridSize; snake.dx = 0; }
                else if (dy < 0 && snake.dy === 0) { snake.dy = -gridSize; snake.dx = 0; }
            }
        });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
